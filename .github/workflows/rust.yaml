name: Pipeline CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  check-bundled-tools:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Show repository state
        run: |
          pwd
          find bin -maxdepth 1 -type f -print || true

      - name: Verify bundled tools exist
        run: |
          test -f bin/bam-ont-normalizer
          test -f bin/bam-transcriptome-to-genome
          test -f bin/bam-quant
          test -f bin/minimap_script_chatty.sh

      - name: Verify executable permissions
        run: |
          test -x bin/bam-ont-normalizer
          test -x bin/bam-transcriptome-to-genome
          test -x bin/bam-quant
          test -x bin/minimap_script_chatty.sh

      - name: Inspect binaries
        run: |
          file bin/bam-ont-normalizer
          file bin/bam-transcriptome-to-genome
          file bin/bam-quant
          ldd bin/bam-ont-normalizer || true
          ldd bin/bam-transcriptome-to-genome || true
          ldd bin/bam-quant || true

      - name: Check Rust tool CLIs
        run: |
          ./bin/bam-ont-normalizer --help
          ./bin/bam-transcriptome-to-genome --help
          ./bin/bam-quant --help

      - name: Check shell script syntax
        run: |
          bash -n bin/minimap_script_chatty.sh

  check-nextflow:
    runs-on: ubuntu-24.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install Nextflow
        run: |
          curl -s https://get.nextflow.io | bash
          ./nextflow -version

      - name: Check Nextflow config
        run: |
          ./nextflow config -flat

      - name: Check pipeline help/config parse
        run: |
          ./nextflow run . --help || true
